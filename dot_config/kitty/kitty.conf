# 背景色：深灰而非纯黑
background #1e1e2e
foreground #cdd6f4

# 稍微透明 + 模糊，macOS 上很有质感
background_opacity 0.92
background_blur 20

# 窗口边距，不要太挤
window_padding_width 8

# 配合 AeroSpace：隐藏 macOS 标题栏和圆角
hide_window_decorations titlebar-and-corners

# 字体（你可以换成自己喜欢的 Nerd Font）
font_family JetBrainsMono Nerd Font
font_size 14.0

# 光标样式
cursor_shape beam
cursor_blink_interval 0.5

# 允许 OSC 52 剪贴板访问（tmux/SSH/nvim 复制直接到系统剪贴板）
clipboard_control write-clipboard write-primary read-clipboard read-primary no-append

# 现代配色（Catppuccin Mocha 风格）
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a5adce

# macOS Option 键当 Alt 用
macos_option_as_alt both
