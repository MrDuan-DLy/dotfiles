# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal and clipboard
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-kitty:Tc,xterm-256color:Tc'
set -as terminal-features ',xterm-kitty:clipboard'
set -s set-clipboard on
set -s focus-events on

# Interaction model
setw -g mode-keys vi
set -g status-keys vi
set -g mouse on

# Indexing and session behavior
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
setw -g automatic-rename off
setw -g allow-rename off

# Scrollback
set -g history-limit 100000

# Create windows/panes in the current pane directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (repeatable)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane border title (Ctrl+a T to name a pane)
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_title} "
bind T command-prompt -p "Pane title:" 'select-pane -T "%%"'

# Scratch popup shell
bind E display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
