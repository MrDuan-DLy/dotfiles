# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal and clipboard
set -g default-terminal "tmux-256color"
set -g terminal-overrides ',xterm-kitty:Tc,xterm-ghostty:Tc,xterm-256color:Tc'
set -g terminal-features ',xterm-kitty:clipboard,xterm-ghostty:clipboard'
set -s set-clipboard on
set -s focus-events on

# Interaction model
setw -g mode-keys vi
set -g status-keys vi
set -g mouse on

# Indexing and session behavior
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
setw -g automatic-rename off
setw -g allow-rename off

# Scrollback
set -g history-limit 100000

# Create windows/panes in the current pane directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (repeatable)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Smart pane navigation with awareness of Neovim splits.
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="\
echo '#{pane_current_command}' | grep -iqE '^${vim_pattern}$' && exit 0
echo '#{pane_current_command}' | grep -iqE '^(bash|zsh|fish)$' && exit 1
ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind-key -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind-key -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind-key -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
bind-key -n M-Left if-shell "$is_vim" 'send-keys M-Left' 'select-pane -L'
bind-key -n M-Down if-shell "$is_vim" 'send-keys M-Down' 'select-pane -D'
bind-key -n M-Up if-shell "$is_vim" 'send-keys M-Up' 'select-pane -U'
bind-key -n M-Right if-shell "$is_vim" 'send-keys M-Right' 'select-pane -R'
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R
bind-key -T copy-mode-vi M-Left select-pane -L
bind-key -T copy-mode-vi M-Down select-pane -D
bind-key -T copy-mode-vi M-Up select-pane -U
bind-key -T copy-mode-vi M-Right select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane border title (Ctrl+a T to name a pane)
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_title} "
bind T command-prompt -p "Pane title:" 'select-pane -T "%%"'

# Scratch popup shell
bind E display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
